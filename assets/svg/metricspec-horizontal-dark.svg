    font-size="72"
    font-weight="700"
    dominant-baseline="middle"
  >
    <tspan fill="#FFFFFF">Metric</tspan><tspan fill="#2CA6A4">Spec</tspan>
  </text>

  <!-- Tagline: light gray -->
  <text
    x="200"
    y="148"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="21"
