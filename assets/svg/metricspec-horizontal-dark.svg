<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" role="img" aria-label="MetricSpec logo dark">
  <title>MetricSpec</title>

  <!-- Dark background -->
  <rect width="680" height="200" fill="#1A1A2E"/>

  <!-- Icon mark — teal hex + white lines -->
  <g transform="translate(20,20) scale(0.8)">
    <polygon
      points="182,100 141,29 59,29 18,100 59,171 141,171"
      fill="none"
      stroke="#2CA6A4"
      stroke-width="8.75"
      stroke-linejoin="round"
    />
    <path
      d="M 55,157 L 88,56"
      stroke="#FFFFFF"
      stroke-width="11.25"
      stroke-linecap="round"
