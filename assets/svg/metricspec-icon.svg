<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="MetricSpec icon">
  <title>MetricSpec Icon</title>
  <!-- Hexagon outline (flat-top, navy) -->
  <polygon
    points="182,100 141,29 59,29 18,100 59,171 141,171"
    fill="none"
    stroke="#1F3A5F"
    stroke-width="7"
    stroke-linejoin="round"
  />
  <!-- Chart line — navy upstroke (left peak) -->
  <path
    d="M 55,157 L 88,56"
    stroke="#1F3A5F"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Chart line — teal valley + right peak -->
  <path
    d="M 88,56 L 120,150 L 152,58"
    stroke="#2CA6A4"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
