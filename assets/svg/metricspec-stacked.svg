<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-label="MetricSpec logo stacked">
  <title>MetricSpec</title>

  <!-- Icon mark (scaled 0.85×, centered at x=260) -->
  <g transform="translate(175,15) scale(0.85)">
    <!-- Flat hexagon background -->
    <polygon points="190,100 145,22 55,22 10,100 55,178 145,178" fill="#1F3A5F"/>
    <!-- White separation channel -->
    <polyline points="52,158 72,44 108,93 150,38" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Teal M-arrow -->
    <polyline points="52,158 72,44 108,93 150,38" stroke="#2CA6A4" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Arrowhead -->
    <polygon points="163,18 156,41 141,29" fill="#2CA6A4"/>
  </g>

  <!-- Wordmark centered -->
  <text x="260" y="234" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    <tspan fill="#1F3A5F">Metric</tspan><tspan fill="#2CA6A4">Spec</tspan>
  </text>

  <!-- Tagline centered -->
  <text x="260" y="282" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#888888" text-anchor="middle" dominant-baseline="middle">Precision Analytics for Better Decisions</text>
</svg>
